{% extends "main.html" %}

{% block content %}
<h2>Страница авторизованного пользователя {{request.user.username}}.</h2>
<div> Скоро здесь появится ваша персональная информация. </div>


<h2> Для выхода из системы нажмите кнопку: </h2>
    <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
        <button type="submit">Выйти</button>
    </form>

{% if is_not_author %}
<button> <a href="/upgrade/"> Хочу стать автором!</a> </button>
{% endif %}

{% endblock %}
